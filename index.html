<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BRAIAN OS</title>

<meta name="theme-color" content="#08111f">

<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="app">

<header class="topbar">

<div>

<h1>BRAIAN OS</h1>

<p>Control total de tu dinero</p>

</div>

<div class="level">

<span>Nivel</span>

<strong>1</strong>

</div>

</header>

<section class="hero">

<h2>Patrimonio Total</h2>

<h1 id="patrimonio">$0</h1>

<p id="mensaje">

Bienvenido.

Cada peso cuenta para construir tu libertad financiera.

</p>

</section>

<section class="cards">

<div class="card">

<span>💵 Disponible</span>

<h3 id="saldo">$0</h3>

</div>

<div class="card">

<span>🏦 Ahorros</span>

<h3 id="ahorro">$0</h3>

</div>

<div class="card">

<span>⚔️ Deudas</span>

<h3 id="deudas">$0</h3>

</div>

<div class="card">

<span>🎯 Meta</span>

<h3>0%</h3>

</div>

</section>

<section class="actions">

<button id="nuevoIngreso">

+ Ingreso

</button>

<button id="nuevoGasto">

- Gasto

</button>

</section>

<section class="movimientos">

<h2>Movimientos</h2>

<div id="listaMovimientos">

<p>No hay movimientos registrados.</p>

</div>

</section>

</div>

<div id="modal" class="modal oculto">

<div class="modal-content">

<h2 id="tituloModal">

Nuevo movimiento

</h2>

<input
id="descripcion"
type="text"
placeholder="Descripción">

<input
id="valor"
type="number"
placeholder="Valor">

<select id="categoria">

<option>Salario</option>

<option>Horas Extras</option>

<option>Alimentación</option>

<option>Gasolina</option>

<option>Arriendo</option>

<option>Servicios</option>

<option>Transporte</option>

<option>Ahorro</option>

<option>Pago deuda</option>

<option>Otro</option>

</select>

<div class="modal-buttons">

<button id="guardarMovimiento">

Guardar

</button>

<button id="cancelarMovimiento">

Cancelar

</button>

</div>

</div>

</div>

<nav class="menu">

<button>🏠</button>

<button>💰</button>

<button>📊</button>

<button>🎯</button>

<button>⚙️</button>

</nav>

<script src="app.js"></script>

</body>

</html>
